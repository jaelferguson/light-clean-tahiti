<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Clean Tahiti</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4fdfb; color: #2c3e50; }
        
        /* PREMIUM GRADIENT HEADER */
        header {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            padding: 50px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* THE WHITE LOGO BOX (Like your picture) */
        .logo-box {
            width: 85px;
            height: 85px;
            background: white;
            border-radius: 22px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .logo-box img { width: 80%; height: auto; }

        h1 { margin: 0; font-size: 28px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
        .subtitle { font-size: 13px; opacity: 0.9; margin-top: 5px; font-weight: 300; }

        /* PREMIUM CARDS */
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            border: 1px solid #eef5f4;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            color: #00bfa6;
            font-weight: 700;
            font-size: 20px;
        }

        /* CLEAN PRICE BOXES */
        .price-box {
            background: #f8fdfd;
            border: 1px solid #e0f2f1;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }
        .price-box span { display: block; font-size: 14px; color: #777; margin-bottom: 5px; }
        .price-box strong { font-size: 26px; color: #2c3e50; font-weight: 700; }

        /* PREMIUM BUTTONS */
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            margin-top: 12px;
            font-size: 16px;
            box-sizing: border-box;
            border: none;
            transition: 0.2s;
        }
        .btn-green { 
            background: linear-gradient(135deg, #00bfa6, #43e97b); 
            color: white; 
            box-shadow: 0 5px 15px rgba(0,191,166,0.2);
        }
        .btn-wa { background: #25D366; color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="logo1.png" alt="Light Clean Logo">
    </div>
    <h1>LIGHT CLEAN</h1>
    <div class="subtitle">NETTOYAGE • JARDINAGE • ÉLAGAGE</div>
</header>

<div class="container">

    <div class="card">
        <div class="card-header">
            <span style="font-size: 30px;">🌴</span> 
            Nos Services
        </div>
        <p style="margin:0; color:#555; line-height: 1.5;">Services de nettoyage premium et entretien de jardins pour villas et Airbnb à Tahiti.</p>
    </div>

    <div class="card">
        <div class="card-header">
            <span style="font-size: 30px;">💰</span> 
            Tarifs Forfaits
        </div>
        <div class="price-box">
            <span>Pack Intervention 3h</span>
            <strong>395 XPF</strong>
        </div>
        <div class="price-box">
            <span>Pack Intervention 6h</span>
            <strong>595 XPF</strong>
        </div>
    </div>

    <div class="card">
        <div class="card-header">📅 Réserver</div>
        <a href="#" class="btn btn-green">Réserver & Payer</a>
        <a href="https://wa.me/68987000000" class="btn btn-wa">Contact Direct WhatsApp</a>
    </div>

</div>

</body>
</html>
